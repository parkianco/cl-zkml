name: Test CL Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install SBCL
      run: sudo apt-get update && sudo apt-get install -y sbcl

    - name: Run tests
      run: sbcl --non-interactive --eval "(asdf:test-system (car (asdf:registered-systems)))" --eval "(quit)"
